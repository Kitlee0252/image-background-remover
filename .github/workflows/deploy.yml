name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx opennextjs-cloudflare build

      - name: Create Pages worker entry and routes
        run: |
          printf "export { default } from '../worker.js';\nexport * from '../worker.js';\n" > .open-next/assets/_worker.js
          printf '{"version":1,"include":["/*"],"exclude":["/_next/static/*","/favicon.ico","/*.svg","/BUILD_ID"]}\n' > .open-next/assets/_routes.json

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=image-background-remover --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
